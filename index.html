<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotMakes HotLinks</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #f8fafc;
        }
        .fade-in { 
            animation: fadeIn 0.4s ease-out; 
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen text-gray-800 pb-12">

    <!-- Header -->
    <header class="bg-gradient-to-r from-orange-600 to-red-600 shadow-md text-white pt-10 pb-8 px-4 mb-8 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-5xl font-extrabold text-center tracking-tight mb-2 drop-shadow-sm">
                <i class="fas fa-fire-flame-curved mr-2"></i> HotMakes HotLinks
            </h1>
            <p class="text-center text-orange-100 text-lg mb-8 font-medium">The Complete Episode Link Dump</p>
            
            <!-- Search Bar -->
            <div class="relative max-w-2xl mx-auto shadow-lg rounded-full">
                <div class="absolute inset-y-0 left-0 flex items-center pl-5 pointer-events-none">
                    <i class="fas fa-search text-gray-400"></i>
                </div>
                <input type="search" id="searchInput" class="block w-full p-4 pl-12 text-gray-900 border-none rounded-full bg-white focus:ring-4 focus:ring-red-400 focus:outline-none transition-all text-lg" placeholder="Search makes, links, or creators...">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 relative z-10">
        <div id="loading" class="text-center py-20">
            <i class="fas fa-circle-notch fa-spin text-5xl text-red-500 mb-4"></i>
            <h2 class="text-xl font-medium text-gray-600">Syncing latest links...</h2>
        </div>

        <div id="content-container"></div>
    </main>

    <!-- Scroll to Top -->
    <button id="scrollToTopBtn" class="fixed bottom-6 right-6 bg-gray-800 text-white rounded-full w-14 h-14 shadow-xl hover:bg-red-600 transition-all transform scale-0 duration-300 z-50 flex items-center justify-center focus:outline-none">
        <i class="fas fa-arrow-up text-xl"></i>
    </button>

    <script>
        const SHEET_ID = '1RsySMkNRZjJfBe1lMPtzfO2Ao7Be96z6hl8XMzD_VdY';
        const GID = '0';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

        let globalEpisodes = [];

        async function initApp() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const csvText = await response.text();
                
                // Parse without headers, because the spreadsheet uses inline headers
                Papa.parse(csvText, {
                    header: false,
                    skipEmptyLines: true,
                    complete: function(results) {
                        processData(results.data);
                    }
                });
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('loading').innerHTML = `
                    <div class="bg-red-50 text-red-600 p-6 rounded-xl border border-red-200 inline-block">
                        <i class="fas fa-exclamation-triangle text-3xl mb-3"></i>
                        <h3 class="text-lg font-bold">Failed to load links</h3>
                        <p class="text-sm">Please check your connection or spreadsheet permissions.</p>
                    </div>`;
            }
        }

        function processData(data) {
            let episodesMap = new Map();
            let currentEpisodeName = "Archived Links"; // Fallback for links before the first header

            data.forEach((row, index) => {
                if (!row || row.length === 0) return;

                // Strip out quotes and extra whitespace from columns
                let colA = (row[0] || '').toString().trim(); // Usually the Maker/Handle or Header
                let colB = (row[1] || '').toString().trim(); // Usually the Tweet/Description
                let colC = (row[2] || '').toString().trim(); // Usually the Link

                if (!colA && !colB && !colC) return; // Skip entirely blank rows

                // Check if this row is an Episode Header (e.g. "HotMakes 216 Link Dump")
                if (colA.toLowerCase().includes('hotmakes') && colA.toLowerCase().includes('link dump')) {
                    currentEpisodeName = colA;
                } else {
                    // It's a standard link row
                    if (!episodesMap.has(currentEpisodeName)) {
                        episodesMap.set(currentEpisodeName, []);
                    }

                    // Try to catch URLs if they accidentally end up in the wrong column
                    let actualLink = colC;
                    if (!actualLink && colB.includes('http')) {
                        const match = colB.match(/https?:\/\/[^\s]+/);
                        if (match) actualLink = match[0];
                    }

                    // Only add if there is actual content
                    if (colA || colB || actualLink) {
                        episodesMap.get(currentEpisodeName).push({
                            maker: colA,
                            description: colB,
                            link: actualLink,
                            rawSearchString: `${colA} ${colB} ${actualLink}`.toLowerCase()
                        });
                    }
                }
            });

            // Convert Map to Array for easy sorting and rendering
            let episodesArray = Array.from(episodesMap, ([name, items]) => ({ name, items }));

            // Sort episodes descending (extract the number from "HotMakes 216 Link Dump")
            episodesArray.sort((a, b) => {
                const numA = parseInt((a.name.match(/\d+/) || [0])[0], 10);
                const numB = parseInt((b.name.match(/\d+/) || [0])[0], 10);
                
                if (numA !== numB && !isNaN(numA) && !isNaN(numB)) {
                    return numB - numA; 
                }
                return b.name.localeCompare(a.name); // Fallback sort
            });

            globalEpisodes = episodesArray;
            document.getElementById('loading').style.display = 'none';
            renderLinks(globalEpisodes, "");
        }

        function renderLinks(episodesArray, searchTerm) {
            const container = document.getElementById('content-container');
            container.innerHTML = '';
            
            let hasAnyResults = false;

            episodesArray.forEach(ep => {
                // Filter the items within this episode based on the search term
                const filteredItems = ep.items.filter(item => 
                    !searchTerm || item.rawSearchString.includes(searchTerm)
                );

                if (filteredItems.length === 0) return; // Hide episode if no items match
                
                hasAnyResults = true;

                const section = document.createElement('div');
                section.className = 'mb-10 fade-in';
                
                const header = document.createElement('h2');
                header.className = 'text-2xl md:text-3xl font-extrabold text-gray-800 mb-4 pb-3 border-b-4 border-red-500 inline-block pr-6 rounded-sm';
                header.innerText = ep.name;
                section.appendChild(header);

                const list = document.createElement('ul');
                list.className = 'bg-white rounded-2xl shadow-sm border border-gray-200 divide-y divide-gray-100 overflow-hidden';
                
                filteredItems.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'p-5 sm:p-6 hover:bg-orange-50 transition-colors duration-200 group flex flex-col sm:flex-row sm:items-start gap-4';
                    
                    let contentHtml = '<div class="flex-1 min-w-0">';
                    
                    // Maker Name / Twitter Handle
                    if (item.maker) {
                        contentHtml += `<h3 class="text-lg font-bold text-gray-900 mb-1">${item.maker}</h3>`;
                    }

                    // Description / Tweet
                    if (item.description) {
                        let desc = item.description;
                        // Lightly highlight hashtags for style
                        desc = desc.replace(/(#\w+)/g, '<span class="text-orange-500 font-medium">$1</span>');
                        contentHtml += `<p class="text-gray-700 text-sm mb-3 leading-relaxed">${desc}</p>`;
                    }
                    
                    // Link
                    if (item.link) {
                        const href = item.link.startsWith('http') ? item.link : `https://${item.link}`;
                        contentHtml += `
                            <a href="${href}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline break-all group-hover:text-red-600 transition-colors">
                                <i class="fas fa-link mr-2 text-gray-400 group-hover:text-red-500 transition-colors"></i> 
                                <span class="truncate max-w-xs md:max-w-md">${item.link}</span>
                            </a>`;
                    }
                    
                    contentHtml += '</div>';
                    
                    // External Link Icon Arrow
                    if (item.link) {
                        const href = item.link.startsWith('http') ? item.link : `https://${item.link}`;
                        contentHtml += `
                            <a href="${href}" target="_blank" rel="noopener noreferrer" class="hidden sm:flex flex-shrink-0 items-center justify-center w-10 h-10 rounded-full bg-gray-50 text-gray-400 group-hover:bg-red-100 group-hover:text-red-600 transition-all ml-4">
                                <i class="fas fa-chevron-right"></i>
                            </a>`;
                    }

                    li.innerHTML = contentHtml;
                    list.appendChild(li);
                });

                section.appendChild(list);
                container.appendChild(section);
            });

            if (!hasAnyResults) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-white rounded-2xl shadow-sm border border-gray-200">
                        <i class="fas fa-search text-5xl text-gray-300 mb-4 block"></i>
                        <h3 class="text-2xl font-bold text-gray-600 mb-2">No links found</h3>
                        <p class="text-gray-400">Try adjusting your search terms.</p>
                    </div>`;
            }
        }

        // Search Input Listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            renderLinks(globalEpisodes, term);
        });

        // Scroll to Top Listener
        const scrollBtn = document.getElementById('scrollToTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) {
                scrollBtn.classList.remove('scale-0');
                scrollBtn.classList.add('scale-100');
            } else {
                scrollBtn.classList.remove('scale-100');
                scrollBtn.classList.add('scale-0');
            }
        });
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        window.onload = initApp;
    </script>
</body>
</html>
